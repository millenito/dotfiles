onboarding = false

[ui]
agent_panel_scope = "current"

show_agent_labels_on_pane_borders = true
[theme]
name = "dracula"

[ui.toast]
delivery = "terminal"

[ui.sound]
enabled = false

[keys]
prefix = "alt+space"

# --- custom keybind overrides ---
# splits / pane (direct alt bindings need iTerm2 "Left Option = Esc+")
split_horizontal   = ["prefix+s", "alt+s"]
split_vertical     = ["prefix+v", "alt+v"]
close_pane         = "alt+x"
# tabs
new_tab            = "prefix+t"
rename_tab         = "prefix+r"
close_tab          = "prefix+w"
next_tab           = "prefix+tab"
previous_tab       = "prefix+shift+tab"
# workspaces
new_workspace      = "prefix+n"
rename_workspace   = "prefix+shift+r"
close_workspace    = "prefix+shift+w"
workspace_picker   = "prefix+g"
goto               = "prefix+space"
# misc
resize_mode        = "prefix+shift+z"
reload_config      = "prefix+f11"
settings           = "prefix+f12"
# unbound (freed keys now used by tab actions above)
cycle_pane_next     = ""
cycle_pane_previous = ""

# vim-herdr-navigation: ctrl+h/j/k/l move across vim splits and herdr panes
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"
