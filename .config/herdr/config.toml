onboarding = false

[ui]
agent_panel_scope = "current"

show_agent_labels_on_pane_borders = true
agent_panel_sort = "spaces"
[theme]
name = "dracula"

[ui.toast]
delivery = "system"

[ui.sound]
enabled = false

[keys]
prefix = "alt+space"

# --- custom keybind overrides ---
# splits / pane (direct alt bindings need iTerm2 "Left Option = Esc+")
split_horizontal   = ["prefix+s", "alt+s"]
split_vertical     = ["prefix+v", "alt+v"]
close_pane         = ["prefix+x","alt+x","alt+q"]
# tabs
new_tab            = ["prefix+t", "alt+t"]
rename_tab         = "prefix+r"
close_tab          = ["prefix+w", "alt+w"]
next_tab           = "alt+tab"          # no prefix (option+tab) — needs iTerm2 "Report modifiers using CSI u"
previous_tab       = "alt+shift+tab"    # no prefix (option+shift+tab)
# workspaces
new_workspace      = "prefix+shift+t"
rename_workspace   = "prefix+shift+r"
close_workspace    = "prefix+shift+w"
workspace_picker   = "prefix+g"
goto               = "prefix+space"
next_workspace     = "prefix+tab"
previous_workspace = "prefix+shift+tab"
# agents (no prefix: option+1..9 focuses agent rows by index)
focus_agent        = "alt+1..9"
next_agent         = "prefix+n"         # cycle to next agent
previous_agent     = "prefix+p"         # cycle to previous agent
# misc
resize_mode        = "prefix+shift+z"
reload_config      = "prefix+f12"
settings           = "prefix+shift+f12"
# unbound (freed keys now used by tab actions above)
cycle_pane_next     = ""
cycle_pane_previous = ""

# vim-herdr-navigation: ctrl+h/j/k/l move across vim splits and herdr panes
[[keys.command]]
key = "ctrl+h"
type = "plugin_action"
command = "vim-herdr-navigation.left"
description = "navigate left (vim/herdr)"

[[keys.command]]
key = "ctrl+j"
type = "plugin_action"
command = "vim-herdr-navigation.down"
description = "navigate down (vim/herdr)"

[[keys.command]]
key = "ctrl+k"
type = "plugin_action"
command = "vim-herdr-navigation.up"
description = "navigate up (vim/herdr)"

[[keys.command]]
key = "ctrl+l"
type = "plugin_action"
command = "vim-herdr-navigation.right"
description = "navigate right (vim/herdr)"
